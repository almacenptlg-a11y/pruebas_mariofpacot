<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GenApps | La Genovesa</title>
    
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e01f36">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#e01f36', 800: '#991b1b', 900: '#7f1d1d' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans transition-colors duration-300 h-screen overflow-hidden flex flex-col selection:bg-brand-500 selection:text-white">

    <div id="loginScreen" class="absolute inset-0 flex items-center justify-center bg-gray-50 dark:bg-gray-900 z-50 transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100 dark:border-gray-700 m-4 transform scale-100 transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-brand-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-brand-600/30">
                    <i class="ph-fill ph-rocket text-3xl text-white"></i>
                </div>
                <h1 class="text-3xl font-black text-gray-900 dark:text-white tracking-tight">GenApps</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-2 font-medium">Plataforma Operativa | La Genovesa</p>
            </div>
            
            <form id="formLogin" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Usuario Corporativo</label>
                    <div class="relative">
                        <i class="ph ph-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="text" id="username" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 dark:text-white rounded-xl focus:ring-2 focus:ring-brand-600 focus:outline-none transition-all" placeholder="Ej. mario" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5">Contraseña</label>
                    <div class="relative">
                        <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                        <input type="password" id="password" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 dark:text-white rounded-xl focus:ring-2 focus:ring-brand-600 focus:outline-none transition-all" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="w-full py-3.5 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-bold text-lg shadow-lg shadow-brand-600/20 transition-all flex justify-center items-center gap-2">
                    Ingresar a GenApps
                </button>
            </form>

            <div class="flex items-center my-6">
                <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                <span class="mx-4 text-xs font-bold text-gray-400 uppercase tracking-widest">Autenticación Federada</span>
                <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
            </div>

            <div class="flex justify-center w-full">
                <div id="g_id_onload"
                     data-client_id="860766315702-l8u9u2sar37soa50llcuudqtin3if0hh.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleLogin"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
            
            <p class="text-center text-xs text-gray-400 mt-6 font-medium">Usa tu cuenta Google Workspace para un acceso directo y seguro.</p>
        </div>
    </div>

    <div id="appContainer" class="hidden flex-col h-full w-full">
        <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 h-16 flex items-center justify-between px-4 z-20 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center shadow-md">
                        <i class="ph-fill ph-rocket text-white"></i>
                    </div>
                    <span class="font-black text-lg text-gray-900 dark:text-white hidden sm:block tracking-tight">GenApps</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-4">
                <button onclick="toggleTheme()" class="p-2 rounded-full text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800 transition-colors" title="Cambiar Tema">
                    <i id="themeIcon" class="ph-fill ph-moon text-xl"></i>
                </button>
                <div class="flex items-center gap-3 pl-2 sm:pl-4 sm:border-l border-gray-200 dark:border-gray-700">
                    <div class="text-right hidden sm:block">
                        <p id="userFullName" class="text-sm font-bold text-gray-800 dark:text-white leading-tight"></p>
                        <p id="userRole" class="text-xs font-bold text-brand-600 dark:text-brand-400 uppercase tracking-wider"></p>
                    </div>
                    <div id="userAvatar" class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center text-white font-black text-lg shadow-md cursor-pointer border-2 border-white dark:border-gray-800" onclick="toggleUserMenu()">
                        ?
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden relative">
            
            <aside id="sidebar" class="absolute inset-y-0 left-0 w-72 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 transform -translate-x-full transition-transform duration-300 ease-in-out z-30 flex flex-col md:relative md:translate-x-0 shadow-2xl md:shadow-none">
                <div class="p-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center md:hidden">
                    <span class="font-black text-gray-800 dark:text-white">Menú Principal</span>
                    <button onclick="toggleSidebar()" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                        <i class="ph ph-x text-xl"></i>
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                    <p class="text-xs font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3 px-3">Tus Aplicaciones</p>
                    <nav id="appsMenu" class="space-y-1.5">
                        </nav>
                </div>

                <div class="p-4 border-t border-gray-100 dark:border-gray-800">
                    <button onclick="logout()" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-xl text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 font-bold transition-colors">
                        <i class="ph ph-sign-out text-lg"></i> Cerrar Sesión
                    </button>
                </div>
            </aside>

            <div id="sidebarOverlay" class="absolute inset-0 bg-gray-900/50 dark:bg-black/60 backdrop-blur-sm z-20 hidden md:hidden transition-opacity opacity-0" onclick="toggleSidebar()"></div>

            <main class="flex-1 relative bg-gray-100 dark:bg-gray-950">
                <iframe id="appFrame" class="w-full h-full border-0" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                
                <div id="welcomeScreen" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                    <div class="w-24 h-24 mb-6 rounded-3xl bg-white dark:bg-gray-800 shadow-xl flex items-center justify-center border border-gray-100 dark:border-gray-700 animate-bounce-slow">
                        <i class="ph-fill ph-squares-four text-5xl text-brand-500"></i>
                    </div>
                    <h2 class="text-3xl font-black text-gray-800 dark:text-white mb-2">Bienvenido a tu Panel</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-sm">Selecciona un módulo en el menú lateral para comenzar a trabajar.</p>
                </div>
            </main>
        </div>
    </div>

    <div id="globalLoader" class="fixed inset-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-sm z-[100] hidden items-center justify-center">
        <div class="flex flex-col items-center">
            <i class="ph ph-spinner-gap animate-spin text-5xl text-brand-600 mb-4"></i>
            <span class="font-bold text-gray-800 dark:text-white tracking-wide">Cargando GenApps...</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
